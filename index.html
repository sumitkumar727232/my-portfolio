<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumit Kumar | Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      line-height: 1.6;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

    header {
      text-align: center;
      padding: 80px 20px;
    }
    h1 { font-size: 3.5rem; margin-bottom: 10px; }
    .subtitle { font-size: 1.4rem; opacity: 0.9; }

    .section { padding: 60px 0; }
    h2 { font-size: 2.5rem; text-align: center; margin-bottom: 40px; }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Hi, I'm Sumit Kumar 👋</h1>
      <p class="subtitle">Full Stack Developer | Web Enthusiast</p>
    </header>

    <div class="section">
      <h2>About Me</h2>
      <p style="text-align:center; font-size:1.2rem; max-width:700px; margin:0 auto;">
        I am a passionate developer who loves creating beautiful and functional websites.
      </p>
    </div>

    <div class="section">
      <h2>My Projects</h2>
      <div class="projects">
        <div class="card">
          <h3>Project 1</h3>
          <p>Personal Portfolio Website</p>
        </div>
        <div class="card">
          <h3>Project 2</h3>
          <p>Coming Soon...</p>
        </div>
      </div>
    </div>

    <footer>
      <p>Made with ❤️ by Sumit Kumar | Deployed on Vercel</p>
    </footer>
  </div>
</body>
</html>
